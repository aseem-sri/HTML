<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Assu Bhai's Feedback Form</title>
    <style>
      /* Modern CSS Reset & Variable Baseline */
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      :root {
        --bg-main: #0b0f19;
        --bg-card: #151d30;
        --bg-input: #0b0f19;
        --accent-neon: #00f2fe;
        --accent-glow: #4facfe;
        --text-bright: #ffffff;
        --text-muted: #94a3b8;
        --border-color: #24324f;
      }
      
      body {
        font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        background: radial-gradient(circle at 50% 0%, #1e2640 0%, var(--bg-main) 70%);
        color: var(--text-bright);
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 50px 20px;
        min-height: 100vh;
      }

      /* Animated Premium Header */
      header {
        text-align: center;
        margin-bottom: 40px;
      }
      h1 {
        font-size: 2.8rem;
        font-weight: 800;
        background: linear-gradient(135deg, var(--accent-neon), var(--accent-glow));
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        text-shadow: 0 0 30px rgba(0, 242, 254, 0.2);
        margin-bottom: 12px;
        letter-spacing: -0.5px;
      }
      p {
        color: #ff4b72;
        font-style: italic;
        font-size: 1.05rem;
        font-weight: 500;
        letter-spacing: 0.5px;
        text-shadow: 0 0 10px rgba(255, 75, 114, 0.2);
      }

      /* Elegant Glass-Card Form container */
      form {
        background-color: var(--bg-card);
        max-width: 650px;
        width: 100%;
        padding: 40px;
        border-radius: 16px;
        box-shadow: 0 20px 40px -15px rgba(0, 0, 0, 0.7);
        border: 1px solid var(--border-color);
      }
      
      fieldset {
        border: 1px solid var(--border-color);
        border-radius: 10px;
        padding: 24px;
        margin-bottom: 30px;
        background-color: rgba(11, 15, 25, 0.3);
        transition: border-color 0.3s;
      }
      fieldset:hover {
        border-color: rgba(0, 242, 254, 0.3);
      }
      legend {
        font-weight: 700;
        padding: 0 12px;
        color: var(--accent-neon);
        font-size: 1.1rem;
        letter-spacing: 0.5px;
      }

      /* Clean Stacked Layout Fields */
      label {
        display: block;
        margin: 14px 0 8px 0;
        color: var(--text-muted);
        font-size: 0.95rem;
        font-weight: 500;
      }
      
      /* Smooth Input & Select Elements */
      input[type="text"],
      input[type="email"],
      input[type="number"],
      select,
      textarea {
        width: 100%;
        padding: 12px 16px;
        background-color: var(--bg-input);
        border: 1px solid var(--border-color);
        border-radius: 8px;
        color: var(--text-bright);
        font-size: 1rem;
        transition: all 0.25s ease;
      }
      input:focus, select:focus, textarea:focus {
        outline: none;
        border-color: var(--accent-neon);
        box-shadow: 0 0 0 4px rgba(0, 242, 254, 0.15);
        background-color: #0e1424;
      }

      /* Inline Alignment for Custom Selections */
      input[type="radio"],
      input[type="checkbox"] {
        accent-color: var(--accent-neon);
        width: 16px;
        height: 16px;
        margin-right: 6px;
        vertical-align: middle;
        cursor: pointer;
      }
      
      fieldset input[type="radio"] + label,
      fieldset input[type="checkbox"] + label {
        display: inline-block;
        margin: 8px 24px 8px 0;
        vertical-align: middle;
        cursor: pointer;
        color: var(--text-bright);
      }

      /* High-Impact Submit Button */
      button[type="submit"] {
        display: block;
        width: 100%;
        padding: 16px;
        background: linear-gradient(135deg, var(--accent-neon), var(--accent-glow));
        color: #060911;
        border: none;
        border-radius: 8px;
        font-size: 1.15rem;
        font-weight: 700;
        cursor: pointer;
        transition: all 0.3s ease;
        box-shadow: 0 4px 15px rgba(0, 242, 254, 0.3);
        margin-top: 10px;
      }
      button[type="submit"]:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 25px rgba(0, 242, 254, 0.5);
        filter: brightness(1.1);
      }
      button[type="submit"]:active {
        transform: translateY(1px);
      }
    </style>
  </head>
  <body>
    <header>
      <h1>Assu Bhai's Feedback Form</h1>
      <p>Acha Acha likhna varna pitti hogi bahut bhayankar.</p>
    </header>
    <main>
      <form method="POST" action="https://freecodecamp.org">
        <fieldset>
          <legend>Personal Information</legend>
          <label for="full-name">Name (required):</label>
          <input type="text" id="full-name" name="name" placeholder="e.g., Assu Passu" required size="20">

          <label for="email">Email address (required):</label>
          <input placeholder="assu@rbl.com" required id="email" type="email" name="email" size="20" />
          
          <label for="age">Age (optional):</label>
          <input required type="number"  placeholder="101" name="age" id="age" min="0" max="6969" />
        </fieldset>

        <fieldset>
          <legend>Is Assu Goated?</legend>
          <input id="yes-option" type="radio" name="assus-portrayal" value="yes" />
          <label for="yes-option">Yes</label>
          <input id="yes-option" type="radio" name="assus-portrayal" value="yes" />
          <label for="yes-option">Yes</label>
        </fieldset>

        <fieldset>
          <legend>Why did you choose to establish a connection with Assu? (Check all that apply)</legend>

          <input checked type="checkbox" id="height" name="choice" value="height" />
          <label for="height">Tall</label>

          <input checked type="checkbox" id="attitude" name="choice" value="attitude" />
          <label for="attitude">Non Challant</label>
          
          <input checked type="checkbox" id="wits" name="choice" value="wits" />
          <label for="wits">Smart</label>

          <input checked type="checkbox" id="attraction" name="choice" value="attraction" />
          <label for="attraction">Great Humour</label>
          
          <input checked type="checkbox" id="price" name="choice" value="price" />
          <label for="price">Charismatic</label>
        </fieldset>

        <fieldset>
          <legend>How Would You Rate Our Time Togethor</legend>
          <label for="service">How was your experience till now?</label>
          <select name="service" id="service">
            <option value="W">W</option>
            <option selected value="10">10</option>
            <option value="goated">Goated</option>
            <option value="peak">Peak</option>
            <option value="prime">Prime</option>
          </select>
        </fieldset>
 
        <fieldset>
          <legend>Best Year Together?</legend>
          <label for="year-input">Enter Year (from 2008):</label>
          <input type="number" id="year-input" name="year" min="2008" max="2026" placeholder="YYYY" required>
        </fieldset>

        <fieldset>
          <label for="comments">Good Words?</label>
          <textarea cols="30" rows="10" name="comments" id="comments"></textarea>
        </fieldset>

        <button type="submit">Submit</button>
      </form>
    </main>
  </body>
</html>
